spring.application.name=SpringAPI

spring.datasource.url=jdbc:postgresql://localhost:5432/cognitive_memory
spring.datasource.username=postgres
spring.datasource.password=admin123

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Configuration
jwt.secret=MyVeryStrongSecretKeyForJwtAuthentication2026SecureKey
jwt.expiration.ms=900000
jwt.refresh.expiration.ms=604800000


# Rate Limiting
request.max-requests=5
request.time-window-ms=60000

# Python AI Gateway
python.ai.service.base-url=http://localhost:8000
# Must match API_BEARER_TOKEN in the Python service .env exactly
python.ai.service.bearer-token=dev-secret-token-123

